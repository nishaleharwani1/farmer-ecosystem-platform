<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Agro Innovator</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #1b5e20, #43a047);
    }

    .login-box {
      background: white;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }

    h2 {
      text-align: center;
      color: #1b5e20;
      margin-bottom: 2rem;
    }

    .footer-text {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
    }

    .footer-text a {
      color: #1b5e20;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div style="position: absolute; top: 20px; right: 20px;">
      <div id="google_translate_element"></div>
      <script type="text/javascript">
          function googleTranslateElementInit() {
              new google.translate.TranslateElement({pageLanguage: 'en', includedLanguages: 'en,hi,mr,ta,te,gu,bn,kn,ml,pa', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
          }
      </script>
      <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </div>
  <div class="login-box">
    <h2>Welcome Back 🌱</h2>
    <form id="loginForm" class="styled-form">
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
    <p class="footer-text">
      New to Agro Innovator? <a href="register.html">Sign Up</a>
    </p>
  </div>

  <script src="login.js"></script>
</body>

</html>
